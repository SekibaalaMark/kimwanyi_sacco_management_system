<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Login - Savings Group System</title>
</h:head>
<h:body style="background-color: #f4f6f9; font-family: Arial, sans-serif;">

    <h:form id="loginForm">
        <p:card style="width: 400px; margin: 8rem auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
            <f:facet name="title">
                <div style="text-align: center; margin-bottom: 1rem;">Savings Group Login</div>
            </f:facet>

            <!-- Global Error / Info Messages -->
            <p:messages id="messages" showDetail="true" closable="true" />

            <div class="ui-fluid">
                <!-- Username -->
                <div class="field" style="margin-bottom: 1.5rem;">
                    <p:outputLabel for="username" value="Username" style="font-weight:bold; display:block; margin-bottom: .5rem;"/>
                    <p:inputText id="username" value="#{authBean.username}" required="true"
                                 requiredMessage="Please enter your username." />
                </div>

                <!-- Password -->
                <div class="field" style="margin-bottom: 2rem;">
                    <p:outputLabel for="password" value="Password" style="font-weight:bold; display:block; margin-bottom: .5rem;"/>
                    <p:password id="password" value="#{authBean.password}" required="true"
                                requiredMessage="Please enter your password." toggleMask="true" feedback="false"/>
                </div>
            </div>

            <!-- Login Action Button (Non-AJAX for clean redirect) -->
            <p:commandButton value="Sign In" action="#{authBean.login}"
                             ajax="false" icon="pi pi-sign-in" styleClass="ui-button-primary" />

            <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9em;">
                New to the group? <p:link href="register.xhtml" value="Register here as a member"/>
            </div>
        </p:card>
    </h:form>

</h:body>
</html>
