<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Member Dashboard - Secure Ledger</title>
    <h:outputStylesheet name="css/layout.css" />
</h:head>

<h:body>
    <p:growl id="msg" showDetail="true" life="4000" />

    <div style="padding: 20px; max-width: 1200px; margin: 0 auto;">
        <!-- Top Title Bar -->
        <h:form id="headerForm">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ccc; padding-bottom: 10px;">
                <h2>Welcome back, #{authBean.currentUser.username}!</h2>
                <p:commandButton value="Logout" action="#{authBean.logout}" icon="pi pi-sign-out" styleClass="ui-button-danger" />
            </div>
        </h:form>

        <!-- Balance Metrics Summary Board -->
        <h:panelGroup id="balanceDisplay" layout="block" style="margin: 20px 0; padding: 20px; background-color: #f8f9fa; border-radius: 8px;">
            <h3>Account Net Balance</h3>
            <h:outputText value="#{transactionBean.currentBalance}" style="font-size: 2.5em; font-weight: bold; color: #2c3e50;">
                <f:convertNumber type="currency" currencySymbol="UGX " maxFractionDigits="0" />
            </h:outputText>
        </h:panelGroup>

        <!-- Financial Operations Matrix -->
        <div style="display: flex; gap: 20px; margin-bottom: 30px;">
            <p:panel header="Make a Deposit" style="flex: 1;">
                <h:form id="depositForm">
                    <h:panelGrid columns="1" style="width: 100%;">
                        <p:outputLabel for="depAmount" value="Enter Deposit Amount (UGX):" />
                        <p:inputNumber id="depAmount" value="#{transactionBean.amount}" symbol="UGX " decimalPlaces="0" min="1" style="width: 100%;" required="true"/>
                        <p:commandButton value="Deposit Funds" action="#{transactionBean.deposit}" update="msg ledgerForm balanceDisplay depositForm" icon="pi pi-plus-circle" styleClass="ui-button-success" style="margin-top: 15px; width: 100%;" />
                    </h:panelGrid>
                </h:form>
            </p:panel>

            <p:panel header="Request a Withdrawal" style="flex: 1;">
                <h:form id="withdrawForm">
                    <h:panelGrid columns="1" style="width: 100%;">
                        <p:outputLabel for="witAmount" value="Enter Withdrawal Amount (UGX):" />
                        <p:inputNumber id="witAmount" value="#{transactionBean.amount}" symbol="UGX " decimalPlaces="0" min="1" style="width: 100%;" required="true"/>
                        <p:commandButton value="Withdraw Funds" action="#{transactionBean.withdraw}" update="msg ledgerForm balanceDisplay withdrawForm" icon="pi pi-minus-circle" styleClass="ui-button-warning" style="margin-top: 15px; width: 100%;" />
                    </h:panelGrid>
                </h:form>
            </p:panel>
        </div>

        <!-- The Audit Trail Ledger Data Table -->
        <h:form id="ledgerForm">
            <p:dataTable var="tx" value="#{transactionBean.transactionHistory}" rows="10" paginator="true"
                         paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                         currentPageReportTemplate="{startRecord}-{endRecord} of {totalRecords} records"
                         rowsPerPageTemplate="5,10,20" emptyMessage="No transactions recorded for this account yet.">

                <f:facet name="header">
                    Account Transaction Ledger Audit
                </f:facet>

                <p:column headerText="Transaction ID" style="text-align: center; width: 120px;">
                    <h:outputText value="#{tx.id}" />
                </p:column>

                <p:column headerText="Timestamp">
                    <h:outputText value="#{tx.createdAt}">
                        <f:convertDateTime pattern="yyyy-MM-dd HH:mm:ss" type="localDateTime" />
                    </h:outputText>
                </p:column>

                <p:column headerText="Type" style="text-align: center; width: 150px;">
                    <span style="padding: 4px 8px; border-radius: 4px; color: white; font-weight: bold; background-color: #{tx.type == 'DEPOSIT' ? '#2ecc71' : '#e74c3c'};">
                        <h:outputText value="#{tx.type}" />
                    </span>
                </p:column>

                <p:column headerText="Amount" style="text-align: right;">
                    <h:outputText value="#{tx.amount}" style="font-weight: bold; color: #{tx.type == 'DEPOSIT' ? '#27ae60' : '#c0392b'};">
                        <f:convertNumber type="currency" currencySymbol="UGX " maxFractionDigits="0" />
                    </h:outputText>
                </p:column>
            </p:dataTable>
        </h:form>
    </div>
</h:body>
</html>
